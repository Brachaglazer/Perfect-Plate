<!DOCTYPE html>
<html lang="en">
    <head>
        <link rel="stylesheet" href="../css/styles.css" type="text/css" />
        <title>Contact Form</title>
    </head>

    <body>
        <img src="../images/logo.png" alt="PerfectPlate Logo" class="logo">
        <form action="contactResponse.php" method="post">

                <label>Username:

                </label>
            </p>
            <p>

            </p>
        </form>
